workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

stages:
  - verify
  - deploy

default:
  interruptible: true

backend_build:
  stage: verify
  image: gradle:8.10-jdk21
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle
      - .gradle
  before_script:
    - chmod +x backend/gradlew
  script:
    - backend/gradlew -p backend build --no-daemon
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - backend/build/libs
  rules:
    - if: $CI_COMMIT_BRANCH

frontend_build:
  stage: verify
  image: node:20
  cache:
    key: npm-cache
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - frontend/.next/
  rules:
    - if: $CI_COMMIT_BRANCH

frontend_test:
  stage: verify
  image: node:20
  cache:
    key: npm-cache
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run test:run
  rules:
    - if: $CI_COMMIT_BRANCH

deploy_home_windows:
  stage: deploy
  tags:
    - home-windows
  needs:
    - job: backend_build
    - job: frontend_build
    - job: frontend_test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
  environment:
    name: production
  script:
    - Write-Host "Starting deploy on home windows runner"
    - if (-not $env:DEPLOY_DIR) { throw "DEPLOY_DIR CI/CD 변수를 설정하세요. 예: C:\\bf-match" }
    - if (-not (Test-Path $env:DEPLOY_DIR)) { New-Item -ItemType Directory -Path $env:DEPLOY_DIR | Out-Null }
    - robocopy $env:CI_PROJECT_DIR $env:DEPLOY_DIR /E /XD .git .gradle .next node_modules /XF .env.local
    - if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }
    - Set-Location "$env:DEPLOY_DIR\\backend"
    - .\gradlew.bat bootJar --no-daemon
    - if ($env:BACKEND_RESTART_CMD) { Invoke-Expression $env:BACKEND_RESTART_CMD } else { Write-Host "BACKEND_RESTART_CMD not set. Skip backend restart." }
    - Set-Location "$env:DEPLOY_DIR\\frontend"
    - npm ci
    - npm run build
    - if ($env:FRONTEND_RESTART_CMD) { Invoke-Expression $env:FRONTEND_RESTART_CMD } else { Write-Host "FRONTEND_RESTART_CMD not set. Skip frontend restart." }
    - Write-Host "Deploy finished"
