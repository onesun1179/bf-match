spring:
  application:
    name: bf-match-backend
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/bfmatch}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:bfmatch}
    password: ${DB_PASSWORD:bfmatch}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${app.auth.kakao.client-id}
            client-secret: ${app.auth.kakao.client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${app.auth.kakao.redirect-uri}
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:local-dev-kakao-client-id}
      client-secret: ${KAKAO_CLIENT_SECRET:local-dev-kakao-client-secret}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
  jwt:
    secret: ${JWT_SECRET:bf-match-dev-jwt-secret-change-this-please-1234567890}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:604800}
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:bf_match_refresh_token}
    secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
    same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
  mail:
    from: ${MAIL_FROM:no-reply@bf-match.local}
